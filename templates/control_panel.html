<h3 class="mb-3 text-center">🛡️ Registro de Auditoría</h3>

<table class="table table-bordered table-striped shadow-sm">
  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Acción</th>
      <th>Fecha</th>
    </tr>
  </thead>
  <tbody>
    {% for log in logs %}
    <tr>
      <td>{{ log[0] }}</td>
      <td>{{ log[1] }}</td>
      <td>{{ log[2] }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
